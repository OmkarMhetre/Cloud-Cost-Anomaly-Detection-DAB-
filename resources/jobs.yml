
resources:
  jobs:
    cloud_cost_anomaly_job:
      name: cloud_cost_anomaly_job

      tasks:

        - task_key: bronze
          notebook_task:
            notebook_path: ../src/transformations/bronze_cloud_budget.ipynb

        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: ../src/transformations/silver_cloud_budget.ipynb

        - task_key: gold_daily
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: ../src/transformations/gold_cloud_budget.ipynb

        - task_key: feature_engineering
          depends_on:
            - task_key: gold_daily
          notebook_task:
            notebook_path: ../notebooks/02_feature_engineering.ipynb

        - task_key: mlflow_tracking
          depends_on:
            - task_key: feature_engineering
          notebook_task:
            notebook_path: ../notebooks/03_mlflow_tracking.ipynb

        - task_key: alert_generation
          depends_on:
            - task_key: mlflow_tracking
          notebook_task:
            notebook_path: ../notebooks/04_alert_generation.ipynb

        - task_key: dashboard
          depends_on:
            - task_key: mlflow_tracking
          notebook_task:
            notebook_path: ../notebooks/05_dashboard.ipynb